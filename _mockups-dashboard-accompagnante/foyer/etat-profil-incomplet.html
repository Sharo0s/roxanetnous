<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foyer — profil incomplet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
</head>
<body>

<header class="app-header">
  <div class="app-header-inner">
    <a href="#" class="logo">roxanetnous</a>
    <nav class="nav-desktop">
      <a href="#" class="active">Accueil</a>
      <a href="#">Profil</a>
    </nav>
  </div>
</header>

<main>

  <section class="hero">
    <div class="portrait" data-initials="M"></div>
    <div class="hero-info">
      <h1 class="hero-name">Marie Dubois</h1>
      <div class="status-badge attente">Profil incomplet</div>
      <p class="hero-location" style="color: var(--ink-faint); font-style: italic;">Ajoutez votre ville pour commencer</p>
    </div>
  </section>

  <div class="divider"></div>

  <div class="banner success" style="text-align: center;">
    <h3>Bienvenue Marie.</h3>
    <p>Pour apparaître auprès des accompagnées, complétez d'abord votre profil professionnel : ville, rayon, spécialités et diplômes.</p>
    <a href="#" style="display: inline-block; margin-top: 0.5rem; padding: 0.7rem 1.5rem; background: var(--ink); color: white; border-radius: 999px; text-decoration: none; font-size: 0.92rem;">Compléter mon profil</a>
  </div>

  <div class="footer-meta">
    <a href="#">Aide</a><span>·</span><a href="#">Se déconnecter</a>
  </div>

</main>
</body>
</html>
