name: Integration Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip:
        description: 'Skip integration tests (echappatoire stabilisation 7j post-merge)'
        required: false
        default: 'false'

jobs:
  integration:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip != 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local stack
        run: supabase start

      - name: Wait for Supabase ready
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:54321/auth/v1/health; do sleep 1; done'

      - name: Capture Supabase keys
        # Les cles sont injectees dans GITHUB_ENV (env-scoped, masque sur jobs)
        # plutot que GITHUB_OUTPUT (persisted as plaintext step output API-readable).
        # Add-mask AVANT l'export pour eviter toute fuite dans les logs intermediaires
        # (review code 2026-05-09 M5).
        run: |
          SERVICE_ROLE_KEY=$(supabase status --output json | jq -r '.SERVICE_ROLE_KEY')
          ANON_KEY=$(supabase status --output json | jq -r '.ANON_KEY')
          echo "::add-mask::$SERVICE_ROLE_KEY"
          echo "::add-mask::$ANON_KEY"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"

      - name: Apply test seeds
        run: npm run seed:test
        env:
          SUPABASE_URL: http://localhost:54321

      - name: Run integration tests
        run: npm run test:integration
        env:
          SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          STRIPE_SECRET_KEY: sk_test_dummy_for_integration_tests
          STRIPE_WEBHOOK_SECRET: whsec_test_secret_for_integration_tests
          PARRAINAGE_INTERNAL_SECRET: parrainage_internal_secret_for_integration_tests
          CRON_SECRET: test-cron-secret-7b2-integration-fixture-32chars

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup
